{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">My Projects</h1>

<div class="row">
{% for project in projects %}
    <div class="col-md-4">
        <div class="card mb-4 p-3">
            <h4>{{ project.title }}</h4>
            <p>{{ project.description }}</p>
            <a class="btn btn-outline-primary" href="{{ project.github_link }}" target="_blank">
                View Code
            </a>
        </div>
    </div>
{% endfor %}
</div>

{% if not projects %}
<p>No projects added yet.</p>
{% endif %}
{% endblock %}
